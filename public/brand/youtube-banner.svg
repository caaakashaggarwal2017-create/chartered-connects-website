  <circle cx="168"  cy="780" r="2"   fill="white"   opacity="0.12"/>
  <circle cx="88"   cy="970" r="2.5" fill="#F5A623" opacity="0.16"/>
  <circle cx="2482" cy="600" r="2.5" fill="#F5A623" opacity="0.18"/>
