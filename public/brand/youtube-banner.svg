  <circle cx="875"  cy="1255" r="2"   fill="white"   opacity="0.10"/>
  <circle cx="1145" cy="1368" r="2.5" fill="#F5A623" opacity="0.12"/>
  <circle cx="1415" cy="1258" r="2"   fill="white"   opacity="0.10"/>
  <circle cx="1675" cy="1372" r="2"   fill="white"   opacity="0.08"/>
