    fill="#F5A623"
    opacity="0.80">charteredconnects.com</text>

  <!-- ───────────────────────────────────────────────────────── -->
  <!--  NEW EPISODES badge  (top-right of safe zone)            -->
  <!-- ───────────────────────────────────────────────────────── -->
  <rect x="1820" y="568" width="215" height="48" rx="24" fill="#F5A623" opacity="0.12"/>
  <rect x="1820" y="568" width="215" height="48" rx="24" fill="none" stroke="#F5A623" stroke-width="1.5" stroke-opacity="0.35"/>
  <text
    x="1928" y="600"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="600"
    fill="#F5A623"
    opacity="0.90">New episodes weekly</text>
