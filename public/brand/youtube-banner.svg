  <!-- ═══════════════════════════════════════════════════════════ -->
  <!--  SAFE-ZONE REFERENCE (invisible — for layout guide)        -->
  <!--  x: 507–2053,  y: 508–931   (1546 × 423 px)               -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- ───────────────────────────────────────────────────────── -->
  <!--  CC LOGO MARK                                             -->
  <!--  Scale 12×,  center at (760, 720)                         -->
  <!--  Offset dx = 760 – 14×12 = 592,  dy = 720 – 14×12 = 552  -->
  <!--  TL(4,8)→(640,648)  TR(24,8)→(880,648)                    -->
  <!--  BL(4,20)→(640,792) BR(24,20)→(880,792)                   -->
  <!-- ───────────────────────────────────────────────────────── -->

  <!-- Spokes: center → corners -->
  <line x1="760" y1="720" x2="640" y2="648" stroke="white" stroke-width="5" stroke-opacity="0.52" stroke-linecap="round"/>
  <line x1="760" y1="720" x2="880" y2="648" stroke="white" stroke-width="5" stroke-opacity="0.52" stroke-linecap="round"/>
  <line x1="760" y1="720" x2="640" y2="792" stroke="white" stroke-width="5" stroke-opacity="0.52" stroke-linecap="round"/>
  <line x1="760" y1="720" x2="880" y2="792" stroke="white" stroke-width="5" stroke-opacity="0.52" stroke-linecap="round"/>

  <!-- Gold horizontal bridges -->
  <line x1="640" y1="648" x2="880" y2="648" stroke="#F5A623" stroke-width="3.5" stroke-opacity="0.42" stroke-linecap="round"/>
  <line x1="640" y1="792" x2="880" y2="792" stroke="#F5A623" stroke-width="3.5" stroke-opacity="0.42" stroke-linecap="round"/>

  <!-- Corner nodes (white) -->
  <circle cx="640" cy="648" r="20" fill="white"/>
  <circle cx="880" cy="648" r="20" fill="white"/>
  <circle cx="640" cy="792" r="20" fill="white"/>
  <circle cx="880" cy="792" r="20" fill="white"/>

  <!-- Center node (gold gradient) -->
  <circle cx="760" cy="720" r="32" fill="url(#centerNodeGrad)"/>
  <circle cx="753" cy="713" r="10" fill="white" opacity="0.22"/>

  <!-- ───────────────────────────────────────────────────────── -->
  <!--  VERTICAL GOLD ACCENT LINE                               -->
  <!-- ───────────────────────────────────────────────────────── -->
  <line x1="955" y1="590" x2="955" y2="870" stroke="#F5A623" stroke-width="2" stroke-opacity="0.45"/>

  <!-- ───────────────────────────────────────────────────────── -->
  <!--  TEXT BLOCK  (x starts at 990, within safe zone)         -->
  <!-- ───────────────────────────────────────────────────────── -->

  <!-- "Chartered Connects"  -->
  <text
    x="990" y="666"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="86"
    font-weight="800"
    fill="white"
    letter-spacing="-1">Chartered Connects</text>

  <!-- Gold divider line -->
  <rect x="990" y="690" width="700" height="4" fill="#F5A623" opacity="0.55" rx="2"/>

  <!-- Tagline -->
